<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI E-Commerce – Search</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header>
            <h1>🛒 AI E-Commerce</h1>
            <p class="subtitle">Smart product search powered by AI</p>
        </header>

        <div class="search-container">
            <div class="search-box">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Try: 'best laptop under 50000' or 'home setup under 200000'"
                    autocomplete="off"
                >
                <button id="searchBtn" onclick="handleSearch()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                    </svg>
                </button>
            </div>
            <div class="categories" id="categories"></div>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>AI is analyzing your query...</p>
        </div>

        <div id="intent-badge" class="intent-badge hidden"></div>

        <div id="results" class="results"></div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
